<div class="container mt-4">
  <h2>Catálogo de Libros</h2>
  <button routerLink="/nuevo" class="btn btn-primary mb-3">Añadir Libro</button>

  @if (loading()) {
    <p>Cargando datos desde el backend en Spring...</p>
  } @else {
    <table class="table">
      <thead>
        <tr><th>Título</th><th>Autor</th><th>ISBN</th><th>Precio</th></tr>
      </thead>
      <tbody>
        @for (libro of libros(); track libro.id) {
          <tr>
            <td>{{ libro.titulo }}</td>
            <td>{{ libro.autor }}</td>
            <td>{{ libro.isbn }}</td>
            <td>{{ libro.precio | currency:'EUR' }}</td>
          </tr>
        } @empty {
          <tr><td colspan="4">No hay libros disponibles.</td></tr>
        }
      </tbody>
    </table>
  }
</div>
