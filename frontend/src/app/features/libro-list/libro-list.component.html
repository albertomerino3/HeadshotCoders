<div class="container mt-4">
  <h2>Catálogo de Libros</h2>
  <button routerLink="/nuevo" class="btn btn-primary mb-3">Añadir Libro</button>

  @if (loading()) {
    <p>Cargando datos desde el backend en Spring...</p>
  } @else {
    <table class="table">
      <thead>
        <tr>
          <th>Título</th>
          <th>Género</th>
          <th>ID Autor</th>
        </tr>
      </thead>
      <tbody>
        @for (libro of libros(); track libro.id) {
          <tr>
            <td>{{ libro.titulo }}</td>
            <td>{{ libro.genero }}</td>
            <td>{{ libro.autorId }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="text-center">No hay libros disponibles.</td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
