<!-- 
  Template for the Book Feature Form.
  Allows users to input book details: title, author, ISBN, and price.
-->
<div class="container mt-4 col-md-6">
  <h2>Nuevo Libro</h2>
  
  <!-- Reactive form for book creation -->
  <form [formGroup]="libroForm" (ngSubmit)="onSubmit()">
    
    <!-- Title Input -->
    <div class="mb-3">
      <label class="form-label">Título</label>
      <input type="text" formControlName="titulo" class="form-control" />
      <!-- Inline validation for title -->
      @if (libroForm.get('titulo')?.touched && libroForm.get('titulo')?.invalid) {
        <small class="text-danger">El título es requerido (mínimo 3 caracteres).</small>
      }
    </div>

    <!-- Author Input -->
    <div class="mb-3">
      <label class="form-label">Autor</label>
      <input type="text" formControlName="autor" class="form-control" />
    </div>

    <!-- ISBN Input -->
    <div class="mb-3">
      <label class="form-label">ISBN</label>
      <input type="text" formControlName="isbn" class="form-control" />
    </div>

    <!-- Price Input -->
    <div class="mb-3">
      <label class="form-label">Precio</label>
      <input type="number" formControlName="precio" class="form-control" />
    </div>

    <!-- Form Actions -->
    <button type="submit" [disabled]="libroForm.invalid" class="btn btn-success">Guardar</button>
    <button type="button" routerLink="/" class="btn btn-secondary ms-2">Cancelar</button>
  </form>
</div>
